name: Update Subsidy Budget

on:
  schedule:
    # KST 08:00 + 18:00 → UTC 23:00 (전날) + 09:00
    - cron: '0 23,9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch budget data
        run: |
          python3 - << 'PYEOF'
          import requests, re, json
          from datetime import datetime, timezone, timedelta

          KST = timezone(timedelta(hours=9))
          now = datetime.now(KST)

          remaining = None
          try:
              resp = requests.get(
                  "https://en-ter.co.kr/ac/main/main.do",
                  headers={"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"},
                  timeout=20
              )
              # 한전 사이트가 id="amtRate" 안에 "NN%" 형태로 잔여예산 박음
              m = re.search(r'id="amtRate"[^>]*>([^<]+)<', resp.text)
              if m:
                  n = re.search(r'(\d+(?:\.\d+)?)', m.group(1))
                  if n:
                      remaining = float(n.group(1))
                      print(f"Found via amtRate: {remaining}%")
              if remaining is None:
                  # 백업 패턴
                  for pat in [r'잔여\s*예산\s*</span>\s*<!--[^>]*-->\s*<!--[^>]*-->\s*<span[^>]*>([^<]+)<',
                              r'잔여예산[^<]*<[^>]+>(\d{1,3}(?:\.\d+)?)\s*%']:
                      m = re.search(pat, resp.text)
                      if m:
                          n = re.search(r'(\d+(?:\.\d+)?)', m.group(1))
                          if n:
                              remaining = float(n.group(1))
                              print(f"Found via backup pattern: {remaining}%")
                              break
          except Exception as e:
              print(f"Fetch error: {e}")

          # 기존값 fallback
          try:
              with open("public/data/subsidy.json") as f:
                  existing = json.load(f)
          except:
              existing = {"remaining": 67, "used": 33}

          if remaining is None or remaining < 0 or remaining > 100:
              print(f"Invalid value, keeping existing: {existing['remaining']}%")
              remaining = existing["remaining"]

          used = round(100 - remaining, 1)
          data = {
              "remaining": remaining,
              "used": used,
              "updated": now.strftime("%Y-%m-%d"),
              "updated_label": now.strftime("%Y.%m.%d %H:%M") + " (KST)",
              "source": "en-ter.co.kr",
              "year": now.year
          }
          # 다음 해 사업 시작일은 사람이 박는 필드 — cron 갱신 시 보존
          if existing.get("next_start_date"):
              data["next_start_date"] = existing["next_start_date"]
          with open("public/data/subsidy.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          print(f"Written: remaining={remaining}%, used={used}%")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/subsidy.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: 한전 지원사업 예산 자동 업데이트 [skip ci]"
            git push
          fi
